version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      extension-tooling:
        patterns:
          - vite
          - vitest
          - "@vitejs/*"
          - typescript
          - tsx
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
